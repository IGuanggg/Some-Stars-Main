name: Update some list

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Run every day at 00:17 China Standard Time (UTC+8).
    # Avoid minute 0, when GitHub Actions scheduled runs are more likely to be delayed or dropped.
    - cron: '17 16 * * *'
  watch:
    types: [started]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate star list
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          STAR_LIST_TOKEN: ${{ github.token }}
        run: node .github/scripts/update-stars.mjs

      - name: Commit updates
        env:
          GITHUB_NAME: ${{ github.repository_owner }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
        run: |
          if git diff --quiet -- README.md data.json; then
            echo "No star list changes."
            exit 0
          fi

          git config user.name "${GITHUB_NAME:-github-actions[bot]}"
          git config user.email "${USER_EMAIL:-41898282+github-actions[bot]@users.noreply.github.com}"
          git add README.md data.json
          git commit -m "chore(updates): updated entries in files"
          git push
